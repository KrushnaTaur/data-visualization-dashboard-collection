<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Movie Ratings Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

/* ===== GLOBAL ===== */

body{
margin:0;
font-family:Arial, Helvetica, sans-serif;
background:#f1f5f9;
color:#1e293b;
}

.container{
max-width:1200px;
margin:auto;
padding:20px;
}

/* ===== HEADER ===== */

header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:20px;
}

header h1{
font-size:28px;
}

/* ===== KPI CARDS ===== */

.kpi-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:20px;
margin-bottom:25px;
}

.card{
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 3px 10px rgba(0,0,0,0.05);
}

.card h3{
margin:0;
font-size:14px;
color:#64748b;
}

.card p{
font-size:24px;
font-weight:bold;
margin-top:8px;
}

/* ===== CHART GRID ===== */

.chart-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(350px,1fr));
gap:20px;
}

.chart-card{
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 3px 10px rgba(0,0,0,0.05);
}

.chart-card h3{
margin-bottom:10px;
}

canvas{
max-height:300px;
}

/* ===== FOOTER ===== */

footer{
text-align:center;
margin-top:30px;
font-size:14px;
color:#64748b;
}

</style>
</head>

<body>

<div class="container">

<header>
<h1>🎬 Movie Ratings Dashboard</h1>
</header>


<!-- KPI CARDS -->

<div class="kpi-grid">

<div class="card">
<h3>Total Movies</h3>
<p>120</p>
</div>

<div class="card">
<h3>Avg Rating</h3>
<p>7.8 / 10</p>
</div>

<div class="card">
<h3>Most Popular Genre</h3>
<p>Action</p>
</div>

</div>


<!-- CHARTS -->

<div class="chart-grid">

<div class="chart-card">
<h3>Ratings by Movie</h3>
<canvas id="movieChart"></canvas>
</div>

<div class="chart-card">
<h3>Genre Distribution</h3>
<canvas id="genreChart"></canvas>
</div>

<div class="chart-card">
<h3>Ratings Trend Over Years</h3>
<canvas id="trendChart"></canvas>
</div>

</div>

<footer>
Movie Ratings Analytics Dashboard | Chart.js
</footer>

</div>



<script>

/* ===== RATINGS BY MOVIE BAR CHART ===== */

new Chart(document.getElementById("movieChart"),{

type:"bar",

data:{
labels:[
"Movie A",
"Movie B",
"Movie C",
"Movie D",
"Movie E"
],

datasets:[{
label:"Rating",
data:[8.2,7.5,9.0,7.8,8.5],
backgroundColor:[
"#3b82f6",
"#22c55e",
"#f59e0b",
"#ef4444",
"#6366f1"
]
}]
},

options:{responsive:true}

})



/* ===== GENRE DISTRIBUTION PIE CHART ===== */

new Chart(document.getElementById("genreChart"),{

type:"pie",

data:{
labels:[
"Action",
"Comedy",
"Drama",
"Thriller",
"Romance"
],

datasets:[{
data:[35,20,18,15,12],

backgroundColor:[
"#3b82f6",
"#22c55e",
"#f59e0b",
"#ef4444",
"#6366f1"
]
}]
},

options:{responsive:true}

})



/* ===== RATINGS TREND LINE CHART ===== */

new Chart(document.getElementById("trendChart"),{

type:"line",

data:{
labels:[
"2016","2017","2018","2019","2020","2021","2022","2023","2024"
],

datasets:[{
label:"Average Rating",
data:[6.8,7.0,7.2,7.5,7.3,7.6,7.7,7.9,8.0],
borderColor:"#3b82f6",
backgroundColor:"rgba(59,130,246,0.2)",
fill:true,
tension:0.4
}]
},

options:{responsive:true}

})

</script>

</body>
</html>
