<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>E-commerce Sales Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

/* ===== GLOBAL ===== */

body{
margin:0;
font-family:Arial, Helvetica, sans-serif;
background:#f1f5f9;
color:#1e293b;
}

.container{
max-width:1200px;
margin:auto;
padding:20px;
}

/* ===== HEADER ===== */

header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:20px;
}

header h1{
font-size:28px;
}

/* ===== KPI CARDS ===== */

.kpi-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:20px;
margin-bottom:25px;
}

.card{
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 3px 10px rgba(0,0,0,0.05);
}

.card h3{
margin:0;
font-size:14px;
color:#64748b;
}

.card p{
font-size:24px;
font-weight:bold;
margin-top:8px;
}

/* ===== CHART GRID ===== */

.chart-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(350px,1fr));
gap:20px;
}

.chart-card{
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 3px 10px rgba(0,0,0,0.05);
}

.chart-card h3{
margin-bottom:10px;
}

canvas{
max-height:300px;
}

/* ===== FOOTER ===== */

footer{
text-align:center;
margin-top:30px;
font-size:14px;
color:#64748b;
}

</style>
</head>

<body>

<div class="container">

<header>
<h1>🛒 E-commerce Sales Dashboard</h1>
</header>


<!-- KPI CARDS -->

<div class="kpi-grid">

<div class="card">
<h3>Total Orders</h3>
<p>3,250</p>
</div>

<div class="card">
<h3>Revenue</h3>
<p>$128,500</p>
</div>

<div class="card">
<h3>Returning Customers</h3>
<p>42%</p>
</div>

</div>


<!-- CHARTS -->

<div class="chart-grid">

<div class="chart-card">
<h3>Monthly Revenue</h3>
<canvas id="revenueChart"></canvas>
</div>

<div class="chart-card">
<h3>Top Selling Products</h3>
<canvas id="productChart"></canvas>
</div>

<div class="chart-card">
<h3>Device Usage</h3>
<canvas id="deviceChart"></canvas>
</div>

</div>

<footer>
E-commerce Sales Analytics Dashboard | Chart.js
</footer>

</div>



<script>

/* ===== MONTHLY REVENUE LINE CHART ===== */

new Chart(document.getElementById("revenueChart"),{

type:"line",

data:{
labels:["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"],

datasets:[{
label:"Revenue ($)",
data:[8000,9500,10000,11000,12500,13000,14000,15000,14500,16000,17000,18000],
borderColor:"#3b82f6",
backgroundColor:"rgba(59,130,246,0.2)",
fill:true,
tension:0.4
}]
},

options:{responsive:true}

})



/* ===== TOP SELLING PRODUCTS BAR CHART ===== */

new Chart(document.getElementById("productChart"),{

type:"bar",

data:{
labels:[
"Smartphone",
"Laptop",
"Headphones",
"Smart Watch",
"Tablet"
],

datasets:[{
label:"Units Sold",
data:[850,650,700,500,420],
backgroundColor:[
"#3b82f6",
"#22c55e",
"#f59e0b",
"#ef4444",
"#6366f1"
]
}]
},

options:{responsive:true}

})



/* ===== DEVICE USAGE PIE CHART ===== */

new Chart(document.getElementById("deviceChart"),{

type:"pie",

data:{
labels:[
"Mobile",
"Desktop"
],

datasets:[{
data:[65,35],

backgroundColor:[
"#3b82f6",
"#22c55e"
]
}]
},

options:{responsive:true}

})

</script>

</body>
</html>
