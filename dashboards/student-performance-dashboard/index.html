<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Student Performance Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

/* ===== GLOBAL ===== */

body{
margin:0;
font-family:Arial, Helvetica, sans-serif;
background:#f1f5f9;
color:#1e293b;
}

.container{
padding:20px;
max-width:1200px;
margin:auto;
}

/* ===== HEADER ===== */

header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:20px;
}

header h1{
font-size:28px;
}

/* ===== KPI CARDS ===== */

.kpi-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:20px;
margin-bottom:25px;
}

.card{
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 3px 10px rgba(0,0,0,0.05);
}

.card h3{
margin:0;
font-size:14px;
color:#64748b;
}

.card p{
font-size:24px;
font-weight:bold;
margin-top:8px;
}

/* ===== CHARTS ===== */

.chart-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(350px,1fr));
gap:20px;
}

.chart-card{
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 3px 10px rgba(0,0,0,0.05);
}

.chart-card h3{
margin-bottom:10px;
}

canvas{
max-height:300px;
}

/* ===== FOOTER ===== */

footer{
text-align:center;
margin-top:30px;
font-size:14px;
color:#64748b;
}

</style>
</head>

<body>

<div class="container">

<header>
<h1>🎓 Student Performance Dashboard</h1>
</header>


<!-- KPI CARDS -->

<div class="kpi-grid">

<div class="card">
<h3>Total Students</h3>
<p>320</p>
</div>

<div class="card">
<h3>Average Score</h3>
<p>78%</p>
</div>

<div class="card">
<h3>Top Performer</h3>
<p>Krushna Taur</p>
</div>

</div>


<!-- CHARTS -->

<div class="chart-grid">

<div class="chart-card">
<h3>Subject Scores</h3>
<canvas id="subjectChart"></canvas>
</div>

<div class="chart-card">
<h3>Semester Performance</h3>
<canvas id="semesterChart"></canvas>
</div>

<div class="chart-card">
<h3>Grade Distribution</h3>
<canvas id="gradeChart"></canvas>
</div>

</div>

<footer>
Academic Analytics Dashboard | Chart.js
</footer>

</div>



<script>

/* ===== SUBJECT SCORES BAR CHART ===== */

new Chart(document.getElementById("subjectChart"),{
type:"bar",
data:{
labels:["Math","Science","English","Computer","History"],
datasets:[{
label:"Average Score",
data:[85,78,74,90,70],
backgroundColor:[
"#3b82f6",
"#22c55e",
"#f59e0b",
"#6366f1",
"#ef4444"
]
}]
},
options:{responsive:true}
})



/* ===== SEMESTER PERFORMANCE LINE CHART ===== */

new Chart(document.getElementById("semesterChart"),{
type:"line",
data:{
labels:["Sem 1","Sem 2","Sem 3","Sem 4","Sem 5","Sem 6"],
datasets:[{
label:"Average Percentage",
data:[68,72,75,78,80,84],
borderColor:"#3b82f6",
backgroundColor:"rgba(59,130,246,0.2)",
fill:true,
tension:0.4
}]
},
options:{responsive:true}
})



/* ===== GRADE DISTRIBUTION PIE CHART ===== */

new Chart(document.getElementById("gradeChart"),{
type:"pie",
data:{
labels:["A Grade","B Grade","C Grade","D Grade"],
datasets:[{
data:[120,100,70,30],
backgroundColor:[
"#22c55e",
"#3b82f6",
"#f59e0b",
"#ef4444"
]
}]
},
options:{responsive:true}
})

</script>

</body>
</html>
