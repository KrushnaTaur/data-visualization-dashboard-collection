<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Population Growth Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

/* ===== GLOBAL ===== */

body{
margin:0;
font-family:Arial, Helvetica, sans-serif;
background:#f1f5f9;
color:#1e293b;
}

.container{
max-width:1200px;
margin:auto;
padding:20px;
}

/* ===== HEADER ===== */

header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:20px;
}

header h1{
font-size:28px;
}

/* ===== KPI CARDS ===== */

.kpi-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:20px;
margin-bottom:25px;
}

.card{
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 3px 10px rgba(0,0,0,0.05);
}

.card h3{
margin:0;
font-size:14px;
color:#64748b;
}

.card p{
font-size:24px;
font-weight:bold;
margin-top:8px;
}

/* ===== CHART GRID ===== */

.chart-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(350px,1fr));
gap:20px;
}

.chart-card{
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 3px 10px rgba(0,0,0,0.05);
}

.chart-card h3{
margin-bottom:10px;
}

canvas{
max-height:300px;
}

/* ===== FOOTER ===== */

footer{
text-align:center;
margin-top:30px;
font-size:14px;
color:#64748b;
}

</style>
</head>

<body>

<div class="container">

<header>
<h1>🌍 Population Growth Dashboard</h1>
</header>


<!-- KPI CARDS -->

<div class="kpi-grid">

<div class="card">
<h3>World Population</h3>
<p>8.1 Billion</p>
</div>

<div class="card">
<h3>Annual Growth Rate</h3>
<p>0.9%</p>
</div>

<div class="card">
<h3>Most Populated Country</h3>
<p>India</p>
</div>

</div>


<!-- CHARTS -->

<div class="chart-grid">

<div class="chart-card">
<h3>Population Growth Over Years</h3>
<canvas id="growthChart"></canvas>
</div>

<div class="chart-card">
<h3>Population by Continent</h3>
<canvas id="continentChart"></canvas>
</div>

<div class="chart-card">
<h3>Urban vs Rural Population</h3>
<canvas id="urbanChart"></canvas>
</div>

</div>

<footer>
Population Analytics Dashboard | Chart.js
</footer>

</div>



<script>

/* ===== POPULATION GROWTH LINE CHART ===== */

new Chart(document.getElementById("growthChart"),{

type:"line",

data:{
labels:["1960","1970","1980","1990","2000","2010","2020","2024"],

datasets:[{
label:"World Population (Billions)",
data:[3,3.7,4.4,5.3,6.1,6.9,7.8,8.1],
borderColor:"#3b82f6",
backgroundColor:"rgba(59,130,246,0.2)",
fill:true,
tension:0.4
}]
},

options:{responsive:true}

})



/* ===== CONTINENT POPULATION BAR CHART ===== */

new Chart(document.getElementById("continentChart"),{

type:"bar",

data:{
labels:[
"Asia",
"Africa",
"Europe",
"North America",
"South America",
"Oceania"
],

datasets:[{
label:"Population (Millions)",
data:[4700,1400,750,600,430,45],
backgroundColor:[
"#3b82f6",
"#22c55e",
"#f59e0b",
"#6366f1",
"#ef4444",
"#14b8a6"
]
}]
},

options:{responsive:true}

})



/* ===== URBAN VS RURAL PIE CHART ===== */

new Chart(document.getElementById("urbanChart"),{

type:"pie",

data:{
labels:["Urban Population","Rural Population"],

datasets:[{
data:[57,43],

backgroundColor:[
"#3b82f6",
"#22c55e"
]
}]
},

options:{responsive:true}

})

</script>

</body>
</html>
