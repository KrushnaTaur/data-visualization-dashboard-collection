<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Fitness Analytics Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

/* ===== GLOBAL ===== */

body{
margin:0;
font-family:Arial, Helvetica, sans-serif;
background:#f1f5f9;
color:#1e293b;
}

.container{
max-width:1200px;
margin:auto;
padding:20px;
}

/* ===== HEADER ===== */

header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:20px;
}

header h1{
font-size:28px;
}

/* ===== KPI CARDS ===== */

.kpi-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:20px;
margin-bottom:25px;
}

.card{
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 3px 10px rgba(0,0,0,0.05);
}

.card h3{
margin:0;
font-size:14px;
color:#64748b;
}

.card p{
font-size:24px;
font-weight:bold;
margin-top:8px;
}

/* ===== CHART GRID ===== */

.chart-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(350px,1fr));
gap:20px;
}

.chart-card{
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 3px 10px rgba(0,0,0,0.05);
}

.chart-card h3{
margin-bottom:10px;
}

canvas{
max-height:300px;
}

/* ===== FOOTER ===== */

footer{
text-align:center;
margin-top:30px;
font-size:14px;
color:#64748b;
}

</style>
</head>

<body>

<div class="container">

<header>
<h1>🏃 Fitness Analytics Dashboard</h1>
</header>


<!-- KPI CARDS -->

<div class="kpi-grid">

<div class="card">
<h3>Steps Today</h3>
<p>9,850</p>
</div>

<div class="card">
<h3>Calories Burned</h3>
<p>540 kcal</p>
</div>

<div class="card">
<h3>Active Minutes</h3>
<p>75 min</p>
</div>

</div>


<!-- CHARTS -->

<div class="chart-grid">

<div class="chart-card">
<h3>Daily Steps</h3>
<canvas id="stepsChart"></canvas>
</div>

<div class="chart-card">
<h3>Workout Types</h3>
<canvas id="workoutChart"></canvas>
</div>

<div class="chart-card">
<h3>Activity Distribution</h3>
<canvas id="activityChart"></canvas>
</div>

</div>

<footer>
Fitness Tracking Dashboard | Chart.js
</footer>

</div>



<script>

/* ===== DAILY STEPS LINE CHART ===== */

new Chart(document.getElementById("stepsChart"),{

type:"line",

data:{
labels:["Mon","Tue","Wed","Thu","Fri","Sat","Sun"],

datasets:[{
label:"Steps",
data:[6500,7200,8000,9000,8500,10200,9850],
borderColor:"#3b82f6",
backgroundColor:"rgba(59,130,246,0.2)",
fill:true,
tension:0.4
}]
},

options:{responsive:true}

})



/* ===== WORKOUT TYPES BAR CHART ===== */

new Chart(document.getElementById("workoutChart"),{

type:"bar",

data:{
labels:[
"Running",
"Cycling",
"Yoga",
"Strength",
"Walking"
],

datasets:[{
label:"Workout Sessions",
data:[5,3,4,2,6],
backgroundColor:[
"#22c55e",
"#3b82f6",
"#f59e0b",
"#ef4444",
"#6366f1"
]
}]
},

options:{responsive:true}

})



/* ===== ACTIVITY DISTRIBUTION DOUGHNUT ===== */

new Chart(document.getElementById("activityChart"),{

type:"doughnut",

data:{
labels:[
"Cardio",
"Strength",
"Flexibility",
"Other"
],

datasets:[{
data:[40,30,20,10],

backgroundColor:[
"#3b82f6",
"#22c55e",
"#f59e0b",
"#ef4444"
]
}]
},

options:{responsive:true}

})

</script>

</body>
</html>
