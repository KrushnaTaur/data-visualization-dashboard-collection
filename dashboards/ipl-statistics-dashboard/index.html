<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>IPL Statistics Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

/* ===== GLOBAL ===== */

body{
margin:0;
font-family:Arial, Helvetica, sans-serif;
background:#f1f5f9;
color:#1e293b;
}

.container{
max-width:1200px;
margin:auto;
padding:20px;
}

/* ===== HEADER ===== */

header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:20px;
}

header h1{
font-size:28px;
}

/* ===== KPI CARDS ===== */

.kpi-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:20px;
margin-bottom:25px;
}

.card{
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 3px 10px rgba(0,0,0,0.05);
}

.card h3{
margin:0;
font-size:14px;
color:#64748b;
}

.card p{
font-size:24px;
font-weight:bold;
margin-top:8px;
}

/* ===== CHART GRID ===== */

.chart-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(350px,1fr));
gap:20px;
}

.chart-card{
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 3px 10px rgba(0,0,0,0.05);
}

.chart-card h3{
margin-bottom:10px;
}

canvas{
max-height:300px;
}

/* ===== FOOTER ===== */

footer{
text-align:center;
margin-top:30px;
font-size:14px;
color:#64748b;
}

</style>
</head>

<body>

<div class="container">

<header>
<h1>🏏 IPL Statistics Dashboard</h1>
</header>


<!-- KPI CARDS -->

<div class="kpi-grid">

<div class="card">
<h3>Total Matches</h3>
<p>1095</p>
</div>

<div class="card">
<h3>Total Runs</h3>
<p>175,000+</p>
</div>

<div class="card">
<h3>Highest Score</h3>
<p>263 (RCB)</p>
</div>

</div>


<!-- CHARTS -->

<div class="chart-grid">

<div class="chart-card">
<h3>Top Run Scorers</h3>
<canvas id="runScorers"></canvas>
</div>

<div class="chart-card">
<h3>Team Wins Distribution</h3>
<canvas id="teamWins"></canvas>
</div>

<div class="chart-card">
<h3>Runs per Season</h3>
<canvas id="seasonRuns"></canvas>
</div>

</div>

<footer>
IPL Analytics Dashboard | Chart.js Demo
</footer>

</div>



<script>

/* ===== TOP RUN SCORERS BAR CHART ===== */

new Chart(document.getElementById("runScorers"),{

type:"bar",

data:{
labels:[
"Virat Kohli",
"Shikhar Dhawan",
"Rohit Sharma",
"David Warner",
"Suresh Raina"
],

datasets:[{
label:"Total Runs",
data:[7263,6769,6211,6397,5528],
backgroundColor:[
"#3b82f6",
"#22c55e",
"#f59e0b",
"#ef4444",
"#6366f1"
]
}]
},

options:{responsive:true}

})



/* ===== TEAM WINS PIE CHART ===== */

new Chart(document.getElementById("teamWins"),{

type:"pie",

data:{
labels:[
"Mumbai Indians",
"Chennai Super Kings",
"Kolkata Knight Riders",
"Royal Challengers Bangalore",
"Others"
],

datasets:[{

data:[5,5,2,0,6],

backgroundColor:[
"#3b82f6",
"#f59e0b",
"#6366f1",
"#ef4444",
"#22c55e"
]

}]

},

options:{responsive:true}

})



/* ===== RUNS PER SEASON LINE CHART ===== */

new Chart(document.getElementById("seasonRuns"),{

type:"line",

data:{
labels:[
"2016","2017","2018","2019",
"2020","2021","2022","2023"
],

datasets:[{

label:"Total Runs",

data:[
16500,17000,18000,18500,
19000,19500,20000,21000
],

borderColor:"#3b82f6",

backgroundColor:"rgba(59,130,246,0.2)",

fill:true,

tension:0.4

}]

},

options:{responsive:true}

})

</script>

</body>
</html>
