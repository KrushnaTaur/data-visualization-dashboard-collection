<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Website Traffic Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

/* ===== GLOBAL ===== */

body{
margin:0;
font-family:Arial, Helvetica, sans-serif;
background:#f1f5f9;
color:#1e293b;
}

.container{
max-width:1200px;
margin:auto;
padding:20px;
}

/* ===== HEADER ===== */

header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:20px;
}

header h1{
font-size:28px;
}

/* ===== KPI CARDS ===== */

.kpi-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:20px;
margin-bottom:25px;
}

.card{
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 3px 10px rgba(0,0,0,0.05);
}

.card h3{
margin:0;
font-size:14px;
color:#64748b;
}

.card p{
font-size:24px;
font-weight:bold;
margin-top:8px;
}

/* ===== CHART GRID ===== */

.chart-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(350px,1fr));
gap:20px;
}

.chart-card{
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 3px 10px rgba(0,0,0,0.05);
}

.chart-card h3{
margin-bottom:10px;
}

canvas{
max-height:300px;
}

/* ===== FOOTER ===== */

footer{
text-align:center;
margin-top:30px;
font-size:14px;
color:#64748b;
}

</style>
</head>

<body>

<div class="container">

<header>
<h1>🌐 Website Traffic Analytics Dashboard</h1>
</header>


<!-- KPI CARDS -->

<div class="kpi-grid">

<div class="card">
<h3>Total Visitors</h3>
<p>125,400</p>
</div>

<div class="card">
<h3>Bounce Rate</h3>
<p>38%</p>
</div>

<div class="card">
<h3>Avg Session Time</h3>
<p>3m 25s</p>
</div>

</div>


<!-- CHARTS -->

<div class="chart-grid">

<div class="chart-card">
<h3>Daily Visitors</h3>
<canvas id="visitorsChart"></canvas>
</div>

<div class="chart-card">
<h3>Traffic Sources</h3>
<canvas id="sourceChart"></canvas>
</div>

<div class="chart-card">
<h3>Device Types</h3>
<canvas id="deviceChart"></canvas>
</div>

</div>

<footer>
Website Traffic Analytics Dashboard | Chart.js
</footer>

</div>



<script>

/* ===== DAILY VISITORS LINE CHART ===== */

new Chart(document.getElementById("visitorsChart"),{

type:"line",

data:{
labels:["Mon","Tue","Wed","Thu","Fri","Sat","Sun"],

datasets:[{
label:"Visitors",
data:[15000,17500,18200,21000,19800,22000,23900],
borderColor:"#3b82f6",
backgroundColor:"rgba(59,130,246,0.2)",
fill:true,
tension:0.4
}]
},

options:{responsive:true}

})



/* ===== TRAFFIC SOURCES BAR CHART ===== */

new Chart(document.getElementById("sourceChart"),{

type:"bar",

data:{
labels:[
"Organic Search",
"Direct",
"Social Media",
"Referral",
"Ads"
],

datasets:[{
label:"Visitors",
data:[42000,30000,22000,18000,13000],
backgroundColor:[
"#3b82f6",
"#22c55e",
"#f59e0b",
"#ef4444",
"#6366f1"
]
}]
},

options:{responsive:true}

})



/* ===== DEVICE TYPES PIE CHART ===== */

new Chart(document.getElementById("deviceChart"),{

type:"pie",

data:{
labels:[
"Mobile",
"Desktop",
"Tablet"
],

datasets:[{
data:[60,35,5],

backgroundColor:[
"#3b82f6",
"#22c55e",
"#f59e0b"
]
}]
},

options:{responsive:true}

})

</script>

</body>
</html>
