<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Weather Analytics Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

/* ===== GLOBAL ===== */

body{
margin:0;
font-family:Arial, Helvetica, sans-serif;
background:#f1f5f9;
color:#1e293b;
}

.container{
max-width:1200px;
margin:auto;
padding:20px;
}

/* ===== HEADER ===== */

header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:20px;
}

header h1{
font-size:28px;
}

/* ===== KPI CARDS ===== */

.kpi-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:20px;
margin-bottom:25px;
}

.card{
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 3px 10px rgba(0,0,0,0.05);
}

.card h3{
margin:0;
font-size:14px;
color:#64748b;
}

.card p{
font-size:24px;
font-weight:bold;
margin-top:8px;
}

/* ===== CHART GRID ===== */

.chart-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(350px,1fr));
gap:20px;
}

.chart-card{
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 3px 10px rgba(0,0,0,0.05);
}

.chart-card h3{
margin-bottom:10px;
}

canvas{
max-height:300px;
}

/* ===== FOOTER ===== */

footer{
text-align:center;
margin-top:30px;
font-size:14px;
color:#64748b;
}

</style>
</head>

<body>

<div class="container">

<header>
<h1>🌦 Weather Analytics Dashboard</h1>
</header>


<!-- KPI CARDS -->

<div class="kpi-grid">

<div class="card">
<h3>Avg Temperature</h3>
<p>27°C</p>
</div>

<div class="card">
<h3>Humidity</h3>
<p>65%</p>
</div>

<div class="card">
<h3>Wind Speed</h3>
<p>14 km/h</p>
</div>

</div>


<!-- CHARTS -->

<div class="chart-grid">

<div class="chart-card">
<h3>Temperature Trend</h3>
<canvas id="tempChart"></canvas>
</div>

<div class="chart-card">
<h3>Monthly Rainfall</h3>
<canvas id="rainChart"></canvas>
</div>

<div class="chart-card">
<h3>Weather Conditions</h3>
<canvas id="weatherChart"></canvas>
</div>

</div>

<footer>
Weather Data Analytics Dashboard | Chart.js
</footer>

</div>



<script>

/* ===== TEMPERATURE TREND LINE CHART ===== */

new Chart(document.getElementById("tempChart"),{

type:"line",

data:{
labels:["Mon","Tue","Wed","Thu","Fri","Sat","Sun"],

datasets:[{
label:"Temperature °C",
data:[26,28,27,29,31,30,28],
borderColor:"#3b82f6",
backgroundColor:"rgba(59,130,246,0.2)",
fill:true,
tension:0.4
}]
},

options:{responsive:true}

})



/* ===== RAINFALL BAR CHART ===== */

new Chart(document.getElementById("rainChart"),{

type:"bar",

data:{
labels:["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"],

datasets:[{
label:"Rainfall (mm)",
data:[20,15,30,45,80,150,210,190,140,90,40,25],
backgroundColor:"#22c55e"
}]
},

options:{responsive:true}

})



/* ===== WEATHER CONDITION PIE CHART ===== */

new Chart(document.getElementById("weatherChart"),{

type:"pie",

data:{
labels:["Sunny","Cloudy","Rainy","Storm"],

datasets:[{
data:[45,25,20,10],

backgroundColor:[
"#f59e0b",
"#94a3b8",
"#3b82f6",
"#ef4444"
]
}]
},

options:{responsive:true}

})

</script>

</body>
</html>
