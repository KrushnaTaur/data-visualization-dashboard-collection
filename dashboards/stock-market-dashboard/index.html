<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Stock Market Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

/* ===== GLOBAL ===== */

body{
margin:0;
font-family:Arial, Helvetica, sans-serif;
background:#f1f5f9;
color:#1e293b;
}

.container{
max-width:1200px;
margin:auto;
padding:20px;
}

/* ===== HEADER ===== */

header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:20px;
}

header h1{
font-size:28px;
}

/* ===== KPI CARDS ===== */

.kpi-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:20px;
margin-bottom:25px;
}

.card{
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 3px 10px rgba(0,0,0,0.05);
}

.card h3{
margin:0;
font-size:14px;
color:#64748b;
}

.card p{
font-size:24px;
font-weight:bold;
margin-top:8px;
}

/* ===== CHART GRID ===== */

.chart-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(350px,1fr));
gap:20px;
}

.chart-card{
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 3px 10px rgba(0,0,0,0.05);
}

.chart-card h3{
margin-bottom:10px;
}

canvas{
max-height:300px;
}

/* ===== FOOTER ===== */

footer{
text-align:center;
margin-top:30px;
font-size:14px;
color:#64748b;
}

</style>
</head>

<body>

<div class="container">

<header>
<h1>📈 Stock Market Analytics Dashboard</h1>
</header>


<!-- KPI CARDS -->

<div class="kpi-grid">

<div class="card">
<h3>Market Index (NIFTY 50)</h3>
<p>21,350</p>
</div>

<div class="card">
<h3>Daily Change</h3>
<p style="color:green">+1.2%</p>
</div>

<div class="card">
<h3>Highest Stock</h3>
<p>Reliance ₹2950</p>
</div>

</div>


<!-- CHARTS -->

<div class="chart-grid">

<div class="chart-card">
<h3>Stock Price Trend</h3>
<canvas id="priceChart"></canvas>
</div>

<div class="chart-card">
<h3>Daily Trading Volume</h3>
<canvas id="volumeChart"></canvas>
</div>

<div class="chart-card">
<h3>Portfolio Allocation</h3>
<canvas id="portfolioChart"></canvas>
</div>

</div>

<footer>
Stock Market Analytics Dashboard | Chart.js
</footer>

</div>



<script>

/* ===== STOCK PRICE LINE CHART ===== */

new Chart(document.getElementById("priceChart"),{

type:"line",

data:{
labels:["Mon","Tue","Wed","Thu","Fri"],

datasets:[{
label:"Stock Price (₹)",
data:[2800,2850,2900,2880,2950],
borderColor:"#3b82f6",
backgroundColor:"rgba(59,130,246,0.2)",
fill:true,
tension:0.4
}]
},

options:{responsive:true}

})



/* ===== TRADING VOLUME BAR CHART ===== */

new Chart(document.getElementById("volumeChart"),{

type:"bar",

data:{
labels:["Mon","Tue","Wed","Thu","Fri"],

datasets:[{
label:"Trading Volume (Millions)",
data:[35,40,50,42,60],
backgroundColor:"#22c55e"
}]
},

options:{responsive:true}

})



/* ===== PORTFOLIO ALLOCATION DOUGHNUT CHART ===== */

new Chart(document.getElementById("portfolioChart"),{

type:"doughnut",

data:{
labels:[
"Technology",
"Banking",
"Energy",
"Pharma",
"Others"
],

datasets:[{

data:[30,25,20,15,10],

backgroundColor:[
"#3b82f6",
"#22c55e",
"#f59e0b",
"#6366f1",
"#ef4444"
]

}]

},

options:{responsive:true}

})

</script>

</body>
</html>
