<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>COVID Analytics Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

/* ===== GLOBAL ===== */

body{
margin:0;
font-family:Arial, Helvetica, sans-serif;
background:#f1f5f9;
color:#1e293b;
}

.container{
max-width:1200px;
margin:auto;
padding:20px;
}

/* ===== HEADER ===== */

header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:20px;
}

header h1{
font-size:28px;
}

/* ===== KPI CARDS ===== */

.kpi-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:20px;
margin-bottom:25px;
}

.card{
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 3px 10px rgba(0,0,0,0.05);
}

.card h3{
margin:0;
font-size:14px;
color:#64748b;
}

.card p{
font-size:24px;
font-weight:bold;
margin-top:8px;
}

/* ===== CHART GRID ===== */

.chart-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(350px,1fr));
gap:20px;
}

.chart-card{
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 3px 10px rgba(0,0,0,0.05);
}

.chart-card h3{
margin-bottom:10px;
}

canvas{
max-height:300px;
}

/* ===== FOOTER ===== */

footer{
text-align:center;
margin-top:30px;
font-size:14px;
color:#64748b;
}

</style>
</head>

<body>

<div class="container">

<header>
<h1>🦠 COVID Analytics Dashboard</h1>
</header>


<!-- KPI CARDS -->

<div class="kpi-grid">

<div class="card">
<h3>Total Cases</h3>
<p>780M</p>
</div>

<div class="card">
<h3>Total Recoveries</h3>
<p>750M</p>
</div>

<div class="card">
<h3>Total Deaths</h3>
<p>7M</p>
</div>

</div>


<!-- CHARTS -->

<div class="chart-grid">

<div class="chart-card">
<h3>Daily Cases Trend</h3>
<canvas id="casesTrend"></canvas>
</div>

<div class="chart-card">
<h3>Cases by Country</h3>
<canvas id="countryCases"></canvas>
</div>

<div class="chart-card">
<h3>Recovery vs Deaths</h3>
<canvas id="recoveryChart"></canvas>
</div>

</div>

<footer>
COVID Data Analytics Dashboard | Chart.js
</footer>

</div>



<script>

/* ===== DAILY CASES LINE CHART ===== */

new Chart(document.getElementById("casesTrend"),{

type:"line",

data:{
labels:["Day 1","Day 2","Day 3","Day 4","Day 5","Day 6","Day 7"],

datasets:[{
label:"Daily Cases (Thousands)",
data:[120,150,180,200,170,140,110],
borderColor:"#ef4444",
backgroundColor:"rgba(239,68,68,0.2)",
fill:true,
tension:0.4
}]
},

options:{responsive:true}

})



/* ===== CASES BY COUNTRY BAR CHART ===== */

new Chart(document.getElementById("countryCases"),{

type:"bar",

data:{
labels:[
"USA",
"India",
"Brazil",
"UK",
"Germany"
],

datasets:[{
label:"Total Cases (Millions)",
data:[110,45,38,25,18],
backgroundColor:[
"#3b82f6",
"#22c55e",
"#f59e0b",
"#6366f1",
"#ef4444"
]
}]
},

options:{responsive:true}

})



/* ===== RECOVERY VS DEATHS DOUGHNUT CHART ===== */

new Chart(document.getElementById("recoveryChart"),{

type:"doughnut",

data:{
labels:["Recoveries","Deaths"],

datasets:[{
data:[750,7],

backgroundColor:[
"#22c55e",
"#ef4444"
]
}]
},

options:{responsive:true}

})

</script>

</body>
</html>
